name: CloudTask CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 1 — BUILD + STATIC CODE ANALYSIS (flake8 + bandit)
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: "Build · Lint · Security Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit

      - name: Static Code Analysis — flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,*.pyc,venv \
            --statistics \
            --tee \
            --output-file=flake8-report.txt || true
          echo "--- flake8 findings ---"
          cat flake8-report.txt || echo "No issues found"

      - name: Security Vulnerability Analysis — Bandit
        run: |
          bandit -r . \
            -x ./.git,./tests,./venv \
            -ll \
            --format txt \
            -o bandit-report.txt || true
          echo "--- bandit findings ---"
          cat bandit-report.txt || echo "No issues found"

      - name: Upload Static Analysis Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: |
            flake8-report.txt
            bandit-report.txt

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 2 — SONARCLOUD ANALYSIS
  # ══════════════════════════════════════════════════════════════════════════
  sonarcloud:
    name: "SonarCloud — Code Quality & Security"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 3 — DEPLOY TO AWS EC2 via SSH
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "Deploy to EC2 via SSH"
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /home/ubuntu/cloudtask-app
            git pull origin main
            echo "=== Updating Python dependencies ==="
            source venv/bin/activate
            pip install --quiet -r requirements.txt
            echo "=== Restarting Gunicorn service ==="
            sudo systemctl restart cloudtask
            echo "=== Deployment complete ==="

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 4 — OWASP ZAP DYNAMIC SECURITY SCAN
  # ══════════════════════════════════════════════════════════════════════════
  zap_scan:
    name: "OWASP ZAP — Dynamic Security Scan"
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for app to be ready
        run: sleep 15

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://${{ secrets.EC2_HOST }}:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html