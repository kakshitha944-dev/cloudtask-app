name: CloudTask CI/CD Pipeline

# ── Trigger ────────────────────────────────────────────────────────────────
# The pipeline runs on every push or pull request to the main branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 1 — BUILD + STATIC CODE ANALYSIS (flake8 + bandit)
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: "Build · Lint · Security Scan"
    runs-on: ubuntu-latest

    steps:
      # 1a. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1b. Set up the Python runtime
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 1c. Install application dependencies plus analysis tools
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit

      # 1d. Lint with flake8 — enforces PEP 8 code style
      #     max-line-length=100 is the project-agreed limit.
      #     E501 (line-too-long) is excluded because templates may be long.
      - name: Static Code Analysis — flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,*.pyc \
            --statistics

      # 1e. Security vulnerability scan with Bandit
      #     -ll = report MEDIUM and HIGH severity issues only.
      #     -r  = recursive scan of the whole project.
      - name: Security Vulnerability Analysis — Bandit
        run: |
          bandit -r . \
            -x ./.git,./tests \
            -ll \
            --format txt

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 2 — SONARCLOUD ANALYSIS
  # Requires secrets: SONAR_TOKEN (set in GitHub → Settings → Secrets)
  # ══════════════════════════════════════════════════════════════════════════
  sonarcloud:
    name: "SonarCloud — Code Quality & Security"
    runs-on: ubuntu-latest
    needs: build          # Only runs if Stage 1 passes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Full git history is required by SonarCloud for accurate blame data
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}     # set manually in secrets

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 3 — DEPLOY TO AWS EC2 (SSH)
  # Requires secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY
  # Only runs on pushes to main (not on pull requests).
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "Deploy to EC2 via SSH"
    runs-on: ubuntu-latest
    needs: sonarcloud     # Only deploys if SonarCloud passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # SSH into the EC2 instance, pull the latest code, reinstall
      # dependencies, and restart the Gunicorn systemd service.
      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /home/ubuntu/cloudtask
            git pull origin main

            echo "=== Installing / updating Python dependencies ==="
            source venv/bin/activate
            pip install --quiet -r requirements.txt

            echo "=== Restarting Gunicorn service ==="
            sudo systemctl restart cloudtask

            echo "=== Deployment complete ==="

  # ══════════════════════════════════════════════════════════════════════════
  # STAGE 4 — OWASP ZAP DYNAMIC APPLICATION SECURITY SCAN
  # Runs against the live deployed application on EC2.
  # Requires secret: EC2_HOST (reused from deploy stage)
  # ══════════════════════════════════════════════════════════════════════════
  zap_scan:
    name: "OWASP ZAP — Dynamic Security Scan"
    runs-on: ubuntu-latest
    needs: deploy         # Only scans after successful deployment

    steps:
      # Give Gunicorn a few seconds to fully restart before scanning
      - name: Wait for app to be ready
        run: sleep 15

      # ZAP Baseline Scan — passive scan, does not attack the application.
      # -I flag means "do not fail the build" (informational mode).
      # Replace the target URL with your actual EC2 public IP/DNS.
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://${{ secrets.EC2_HOST }}:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"

      # Upload the ZAP HTML report as a downloadable build artefact
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-report
          path: report_html.html
