# ── SonarCloud Project Configuration ─────────────────────────────────────
# Replace YOUR_GITHUB_USERNAME and YOUR_SONARCLOUD_ORG with actual values.
# These values must match what you created on sonarcloud.io.

sonar.projectKey=YOUR_GITHUB_USERNAME_cloudtask
sonar.organization=YOUR_SONARCLOUD_ORG
sonar.projectName=CloudTask
sonar.projectVersion=1.0

# Source root — scan from the project root
sonar.sources=.

# Exclude non-application directories from analysis
sonar.exclusions=**/__pycache__/**,**/*.pyc,.git/**,venv/**,*.cfg,*.ini

# Python version used by the project
sonar.python.version=3.10
