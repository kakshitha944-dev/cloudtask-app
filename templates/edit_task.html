{% extends "base.html" %}
{% block title %}Edit Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card p-4">
            <h3 class="fw-bold mb-4">
                <i class="bi bi-pencil-square me-2 text-primary"></i>Edit Task
            </h3>

            <form method="POST"
                  action="{{ url_for('edit_task', task_id=task.id) }}"
                  novalidate>
                <div class="mb-3">
                    <label for="title" class="form-label fw-semibold">
                        Task Title <span class="text-danger">*</span>
                    </label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-control"
                        value="{{ task.title }}"
                        required
                        maxlength="120"
                    >
                    <div class="form-text">Required. Max 120 characters.</div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">
                        Description
                    </label>
                    <textarea
                        id="description"
                        name="description"
                        class="form-control"
                        rows="4"
                    >{{ task.description or '' }}</textarea>
                </div>

                <div class="mb-4">
                    <label for="status" class="form-label fw-semibold">
                        Status
                    </label>
                    <select id="status" name="status" class="form-select">
                        <option value="pending"
                            {% if task.status == 'pending' %}selected{% endif %}>
                            ⏳ Pending
                        </option>
                        <option value="in_progress"
                            {% if task.status == 'in_progress' %}selected{% endif %}>
                            🔄 In Progress
                        </option>
                        <option value="done"
                            {% if task.status == 'done' %}selected{% endif %}>
                            ✅ Done
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary fw-semibold px-4">
                        <i class="bi bi-save me-1"></i> Save Changes
                    </button>
                    <a href="{{ url_for('index') }}"
                       class="btn btn-outline-secondary fw-semibold px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
