{% extends "base.html" %}
{% block content %}

<a href="/add">Add Task</a>

<ul>
{% for task in tasks %}
    <li>
        <b>{{ task.title }}</b> - {{ task.status }}
        <a href="/edit/{{ task.id }}">Edit</a>
        <a href="/delete/{{ task.id }}">Delete</a>
    </li>
{% endfor %}
</ul>

{% endblock %}
