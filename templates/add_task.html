{% extends "base.html" %}
{% block title %}Add Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card p-4">
            <h3 class="fw-bold mb-4">
                <i class="bi bi-plus-circle me-2 text-primary"></i>Add New Task
            </h3>

            <form method="POST" action="{{ url_for('add_task') }}" novalidate>
                <div class="mb-3">
                    <label for="title" class="form-label fw-semibold">
                        Task Title <span class="text-danger">*</span>
                    </label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-control"
                        placeholder="Enter task title"
                        required
                        maxlength="120"
                    >
                    <div class="form-text">Required. Max 120 characters.</div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label fw-semibold">
                        Description
                    </label>
                    <textarea
                        id="description"
                        name="description"
                        class="form-control"
                        rows="4"
                        placeholder="Optional details about this task…"
                    ></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary fw-semibold px-4">
                        <i class="bi bi-plus-lg me-1"></i> Add Task
                    </button>
                    <a href="{{ url_for('index') }}"
                       class="btn btn-outline-secondary fw-semibold px-4">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
