{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 mt-4">
            <div class="text-center mb-4">
                <i class="bi bi-box-arrow-in-right display-5 text-primary"></i>
                <h3 class="fw-bold mt-2">Welcome Back</h3>
                <p class="text-muted small">Sign in to your CloudTask account</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">
                        Email address
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-control"
                        placeholder="you@example.com"
                        required
                        maxlength="120"
                        autocomplete="email"
                    >
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="••••••••"
                        required
                        minlength="8"
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>
            </form>

            <hr class="my-3">
            <p class="text-center text-muted small mb-0">
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-primary fw-semibold">
                    Register here
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
# all up to date
